<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-3 w-100" style="max-width:350px;">

<h4 class="text-center">Reset Password</h4>

<form>

<div class="input-group mb-2">
<input type="password" id="p1" class="form-control" placeholder="New Password" required>
<span class="input-group-text" onclick="toggle('p1')">
<i class="bi bi-eye"></i>
</span>
</div>

<div class="input-group mb-2">
<input type="password" id="p2" class="form-control" placeholder="Confirm Password" required>
<span class="input-group-text" onclick="toggle('p2')">
<i class="bi bi-eye"></i>
</span>
</div>

<a href="login.html" class="btn btn-primary w-100">Update</a>

</form>

</div>
</div>

<script>
function toggle(id){
let x = document.getElementById(id);
x.type = x.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
