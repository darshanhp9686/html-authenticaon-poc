<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-3 w-100" style="max-width:400px;">

<h4 class="text-center">Register</h4>

<!-- FORM REDIRECTS TO LOGIN -->
<form action="login.html">

<input type="text" class="form-control mb-2" placeholder="Name" required>

<input type="email" class="form-control mb-2" placeholder="Email" required>

<input type="tel" class="form-control mb-2" placeholder="Phone" required>

<input type="password" class="form-control mb-2" placeholder="Password" required>

<input type="password" class="form-control mb-3" placeholder="Confirm Password" required>

<button type="submit" class="btn btn-success w-100">Register</button>

</form>

<div class="text-center mt-2">
<a href="login.html">Already have an account? Login</a>
</div>

</div>
</div>
</body>
</html>
